<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post | ThriveFusion</title>

<style>
body{
  font-family:system-ui,Segoe UI,Roboto,Arial;
  max-width:900px;
  margin:40px auto;
  padding:0 20px;
  line-height:1.7;
  background:#fafafa;
  color:#222;
}
h1{
  margin-bottom:20px;
}
.content{
  background:#fff;
  padding:25px;
  border-radius:8px;
  border:1px solid #e6e6e6;
}
a{
  display:inline-block;
  margin-bottom:20px;
  text-decoration:none;
  color:#1a73e8;
}
</style>
</head>

<body>

<a href="blog.html">← Back to Blog</a>

<div id="post"></div>
<p id="loading">Loading post...</p>

<script>
function normalize(str){
  return str
    .toLowerCase()
    .replace(/<\/?[^>]+>/g,"")   // remove HTML
    .replace(/[^\w\s-]/g,"")     // remove special chars
    .trim()
    .replace(/\s+/g,"-");        // spaces → dash
}

async function loadPost(){
  try{
    const params = new URLSearchParams(window.location.search);
    const titleParam = params.get("title");

    if(!titleParam){
      throw new Error("Missing title");
    }

    const decodedTitle = decodeURIComponent(titleParam);
    const targetSlug = normalize(decodedTitle);

    const res = await fetch("./posts_clean.json");
    if(!res.ok){
      throw new Error("posts_clean.json not found");
    }

    const posts = await res.json();

    const post = posts.find(p => {
      const postSlug = normalize(p.title || "");
      return postSlug === targetSlug;
    });

    const container = document.getElementById("post");
    const loading = document.getElementById("loading");

    loading.style.display = "none";

    if(!post){
      container.innerHTML = "<p>Post not found.</p>";
      return;
    }

    container.innerHTML = `
      <h1>${post.title}</h1>
      <div class="content">${post.content}</div>
    `;

  }catch(e){
    document.getElementById("loading").innerText = "Failed to load post.";
    console.error(e);
  }
}

loadPost();
</script>

</body>
</html>
